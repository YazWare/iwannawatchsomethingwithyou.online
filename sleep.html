<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>goodnight my dear</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Raleway:ital,wght@0,200;0,300;1,200;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #020d12;
      --accent:  #00d4b4;
      --accent2: #0099aa;
      --glow1:   #00ffcc;
      --text:    #cff5f0;
      --muted:   #4a8a8a;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Raleway', sans-serif; font-size: 13px; -webkit-tap-highlight-color: transparent; }

    #bg-video { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; object-fit: cover; filter: saturate(2.4) brightness(0.75) hue-rotate(-5deg); pointer-events: none; }
    #bg-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: rgba(2,8,14,0.15); }
    #bg-spores {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background-image:
        radial-gradient(circle 3px at 12% 25%, rgba(0,255,180,0.95) 0%, transparent 100%),
        radial-gradient(circle 2px at 35% 65%, rgba(0,220,200,0.85) 0%, transparent 100%),
        radial-gradient(circle 4px at 62% 18%, rgba(100,255,180,0.75) 0%, transparent 100%),
        radial-gradient(circle 3px at 78% 52%, rgba(0,200,160,0.9) 0%, transparent 100%),
        radial-gradient(circle 2px at 22% 80%, rgba(0,255,200,0.7) 0%, transparent 100%),
        radial-gradient(circle 5px at 88% 8%,  rgba(0,180,220,0.8) 0%, transparent 100%),
        radial-gradient(circle 2px at 50% 88%, rgba(120,255,180,0.65) 0%, transparent 100%),
        radial-gradient(circle 4px at 8%  48%, rgba(0,210,180,0.75) 0%, transparent 100%),
        radial-gradient(circle 2px at 42% 35%, rgba(180,255,200,0.55) 0%, transparent 100%),
        radial-gradient(circle 3px at 95% 65%, rgba(0,255,160,0.65) 0%, transparent 100%),
        radial-gradient(circle 2px at 18% 10%, rgba(0,200,255,0.55) 0%, transparent 100%),
        radial-gradient(circle 3px at 68% 92%, rgba(0,255,180,0.7) 0%, transparent 100%);
      animation: sporeFloat 22s ease-in-out infinite alternate; filter: blur(0.3px);
    }
    @keyframes sporeFloat { 0%{transform:translateY(0) translateX(0);opacity:.9} 50%{transform:translateY(-14px) translateX(6px);opacity:.55} 100%{transform:translateY(-28px) translateX(-4px);opacity:.3} }
    #moonparticles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .mote { position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(200,240,255,0.9), transparent); animation: moteFloat linear infinite; opacity: 0; }
    @keyframes moteFloat { 0%{transform:translateY(110vh) translateX(0);opacity:0} 10%{opacity:.6} 90%{opacity:.2} 100%{transform:translateY(-10vh) translateX(var(--drift));opacity:0} }

    #ctc { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #020d12; cursor: pointer; transition: opacity .6s ease; }
    #ctc.hide { opacity: 0; pointer-events: none; }
    .ctc-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; color: rgba(0,255,200,0.6); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .3em; text-transform: uppercase; animation: ctcPulse 2.5s ease-in-out infinite; }
    .ctc-moon { font-size: 32px; filter: drop-shadow(0 0 18px rgba(180,230,255,0.7)); }
    @keyframes ctcPulse { 0%,100%{opacity:.5;transform:translateY(0)} 50%{opacity:1;transform:translateY(-6px)} }

    #lobby { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 36px; padding: 24px; }
    .lobby-emblem { width: 80px; height: 80px; border-radius: 50%; background: rgba(0,22,18,0.88); border: 1px solid rgba(0,255,200,0.22); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(0,212,180,0.25),0 0 100px rgba(0,180,150,0.12),inset 0 0 30px rgba(0,100,80,0.12),inset 0 1px 0 rgba(0,255,200,0.18); animation: emblemPulse 4s ease-in-out infinite; position: relative; font-size: 30px; }
    .lobby-emblem::before { content:''; position:absolute; inset:8px; border-radius:50%; border:1px solid rgba(0,255,180,0.12); background:radial-gradient(circle at 35% 35%,rgba(0,255,200,0.07),transparent 70%); }
    @keyframes emblemPulse { 0%,100%{box-shadow:0 0 50px rgba(0,212,180,0.25),0 0 100px rgba(0,180,150,0.12),inset 0 0 30px rgba(0,100,80,0.12),inset 0 1px 0 rgba(0,255,200,0.18)} 50%{box-shadow:0 0 70px rgba(0,212,180,0.4),0 0 140px rgba(0,180,150,0.2),inset 0 0 45px rgba(0,150,120,0.18),inset 0 1px 0 rgba(0,255,200,0.24)} }
    .lobby-text { text-align: center; display: flex; flex-direction: column; gap: 8px; }
    .lobby-title { font-family:'Cinzel',serif; font-size:clamp(1.6rem,6vw,3rem); font-weight:300; color:var(--text); letter-spacing:.08em; text-shadow:0 0 40px rgba(0,212,180,0.7),0 0 80px rgba(0,180,150,0.3),0 2px 4px rgba(0,0,0,0.5); }
    .lobby-sub { font-size:10px; color:var(--muted); letter-spacing:.3em; text-transform:uppercase; font-weight:300; font-style:italic; }
    .lobby-form { display:flex; flex-direction:column; gap:12px; width:min(300px,90vw); }
    .lobby-form input { background:rgba(2,14,20,0.88); border:1px solid rgba(0,212,180,0.2); box-shadow:inset 0 1px 0 rgba(0,255,200,0.07),0 8px 32px rgba(0,0,0,0.4); color:var(--text); font-family:'Raleway',sans-serif; font-size:16px; padding:14px 16px; border-radius:6px; outline:none; text-align:center; letter-spacing:.1em; font-weight:200; transition:border-color .3s,box-shadow .3s; }
    .lobby-form input::placeholder { color:var(--muted); }
    .lobby-form input:focus { border-color:rgba(0,212,180,0.5); box-shadow:0 0 0 3px rgba(0,212,180,0.1),0 0 30px rgba(0,212,180,0.15),inset 0 1px 0 rgba(0,255,200,0.08); }
    .lobby-form button { background:rgba(4,20,28,0.88); border:1px solid rgba(0,212,180,0.32); box-shadow:0 0 24px rgba(0,212,180,0.12),inset 0 1px 0 rgba(0,255,200,0.12),0 8px 32px rgba(0,0,0,0.3); color:var(--accent); font-family:'Cinzel',sans-serif; font-size:11px; letter-spacing:.2em; text-transform:uppercase; padding:14px; border-radius:6px; cursor:pointer; transition:all .3s; position:relative; overflow:hidden; }
    .lobby-form button:hover { border-color:rgba(0,212,180,0.5); }
    .lobby-form button:active { background:rgba(0,212,180,0.18); }
    .watch-btn { display:flex; align-items:center; justify-content:center; gap:8px; background:transparent; border:1px solid rgba(0,212,180,0.18); color:var(--muted); font-family:'Cinzel',serif; font-size:10px; letter-spacing:.22em; text-transform:uppercase; padding:11px 14px; border-radius:6px; cursor:pointer; transition:all .3s; text-decoration:none; width:100%; }
    .watch-btn:hover { color:var(--accent); border-color:rgba(0,212,180,0.35); }
    .watch-divider { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:9px; letter-spacing:.2em; }
    .watch-divider::before,.watch-divider::after { content:''; flex:1; height:1px; background:rgba(0,212,180,0.1); }

    #app { display: none; }
    #app.on { display:flex; flex-direction:column; position:fixed; inset:0; z-index:3; }

    #hdr { flex-shrink:0; display:flex; align-items:center; gap:12px; height:44px; padding:0 16px; background:rgba(2,12,18,0.85); border-bottom:1px solid rgba(0,255,200,0.09); position:relative; z-index:10; }
    #hdr::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,200,0.2),rgba(0,255,200,0.35),rgba(0,255,200,0.2),transparent); }
    .htitle { font-family:'Cinzel',serif; font-size:1rem; font-weight:300; color:var(--accent); letter-spacing:.15em; margin-right:auto; text-shadow:0 0 20px rgba(0,212,180,0.6),0 0 40px rgba(0,180,150,0.25); }
    .dots { display:flex; gap:6px; align-items:center; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all .4s; }
    .dot.on { background:var(--glow1); box-shadow:0 0 8px var(--glow1),0 0 18px rgba(0,255,200,0.35); }
    #plbl { font-size:10px; color:var(--muted); letter-spacing:.08em; font-weight:300; }

    #tabs { flex-shrink:0; display:flex; height:38px; background:rgba(2,10,16,0.85); border-bottom:1px solid rgba(0,255,200,0.08); }
    .tab { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; transition:all .25s; position:relative; }
    .tab::after { content:''; position:absolute; bottom:0; left:20%; right:20%; height:1px; background:var(--accent); opacity:0; transition:opacity .25s; }
    .tab.active { color:var(--accent); }
    .tab.active::after { opacity:1; }

    #body { flex:1; min-height:0; display:flex; overflow:hidden; }
    .panel { flex:1; display:none; flex-direction:column; min-height:0; overflow:hidden; }
    .panel.active { display:flex; }

    #sleep-panel { background:rgba(2,8,14,0.45); }
    #sleep-scroll { flex:1; overflow-y:auto; padding:14px 14px 20px; display:flex; flex-direction:column; gap:12px; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
    #sleep-scroll::-webkit-scrollbar { width:0; }

    #nowplaying { background:rgba(0,20,16,0.85); border:1px solid rgba(0,255,200,0.14); box-shadow:0 0 30px rgba(0,212,180,0.08),inset 0 1px 0 rgba(0,255,200,0.08); border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
    .np-label { font-size:9px; color:var(--muted); letter-spacing:.25em; text-transform:uppercase; font-family:'Cinzel',serif; }
    .np-title { font-family:'Cinzel',serif; font-size:13px; color:var(--text); letter-spacing:.06em; min-height:18px; text-shadow:0 0 20px rgba(0,212,180,0.4); line-height:1.4; }
    .np-sub { font-size:9px; color:var(--muted); font-style:italic; letter-spacing:.06em; min-height:12px; }
    .np-transport { display:flex; align-items:center; gap:8px; }
    .np-btn { background:rgba(2,16,22,0.80); border:1px solid rgba(0,212,180,0.18); color:var(--text); border-radius:4px; padding:6px 14px; font-size:13px; cursor:pointer; transition:all .2s; touch-action:manipulation; flex-shrink:0; }
    .np-btn:active { border-color:var(--accent); color:var(--accent); }
    #skip-btn { font-size:11px; }
    .np-seek { display:flex; align-items:center; gap:8px; }
    #seek { flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; outline:none; background:linear-gradient(to right,var(--accent) 0%,var(--accent) 0%,rgba(0,212,180,0.2) 0%); cursor:pointer; }
    #seek::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--glow1); box-shadow:0 0 8px rgba(0,255,200,0.5); }
    .np-time { font-size:9px; color:var(--muted); font-family:'Cinzel',serif; white-space:nowrap; min-width:72px; text-align:right; }
    #seek-wrap { display:none; }
    .np-vol { display:flex; align-items:center; gap:6px; }
    .np-vol span { font-size:11px; }
    #vol { flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; outline:none; background:linear-gradient(to right,var(--accent) 0%,var(--accent) 70%,rgba(0,212,180,0.2) 70%); cursor:pointer; }
    #vol::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:var(--glow1); box-shadow:0 0 8px rgba(0,255,200,0.5); }
    #sync-pill { font-size:9px; color:var(--accent); border:1px solid rgba(0,212,180,0.25); background:rgba(0,212,180,0.07); border-radius:20px; padding:2px 8px; opacity:0; transition:opacity .3s; letter-spacing:.08em; font-family:'Cinzel',serif; align-self:flex-end; }
    #sync-pill.on { opacity:1; }

    .sec-label { font-size:9px; color:var(--muted); letter-spacing:.25em; text-transform:uppercase; font-family:'Cinzel',serif; padding:0 2px; margin-top:4px; }
    #queue-list { display:flex; flex-direction:column; gap:5px; }
    .q-item { display:flex; align-items:center; gap:8px; background:rgba(0,30,20,0.70); border:1px solid rgba(0,255,200,0.1); border-radius:7px; padding:8px 10px; cursor:pointer; transition:border-color .2s; }
    .q-item:hover { border-color:rgba(0,255,200,0.22); }
    .q-item.q-active { border-color:rgba(0,255,200,0.32); background:rgba(0,40,28,0.8); }
    .q-pos { font-size:9px; color:var(--muted); font-family:'Cinzel',serif; width:16px; text-align:center; flex-shrink:0; }
    .q-name { flex:1; font-size:11px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:'Cinzel',serif; letter-spacing:.04em; }
    .q-badge { font-size:8px; color:var(--muted); background:rgba(0,212,180,0.08); border:1px solid rgba(0,212,180,0.12); border-radius:10px; padding:1px 6px; flex-shrink:0; }
    .q-del { background:none; border:none; color:rgba(0,212,180,0.3); font-size:16px; cursor:pointer; padding:0 2px; touch-action:manipulation; flex-shrink:0; }
    .q-del:hover { color:rgba(255,100,80,0.6); }
    .q-empty { font-size:10px; color:var(--muted); font-style:italic; text-align:center; padding:12px 0; }

    #addinput { display:flex; gap:8px; }
    #turl { flex:1; background:rgba(2,14,20,0.80); border:1px solid rgba(0,212,180,0.14); color:var(--text); font-family:'Raleway',sans-serif; font-size:14px; font-weight:200; padding:9px 12px; border-radius:6px; outline:none; transition:border-color .2s; }
    #turl:focus { border-color:rgba(0,212,180,0.4); }
    #turl::placeholder { color:var(--muted); font-size:11px; }
    #addinput button { background:rgba(4,20,28,0.85); border:1px solid rgba(0,153,170,0.32); color:var(--accent); font-family:'Cinzel',serif; font-size:10px; letter-spacing:.12em; padding:9px 12px; border-radius:6px; cursor:pointer; transition:all .2s; white-space:nowrap; }
    #addinput button:active { background:rgba(0,153,170,0.22); }

    #lib-list { display:flex; flex-direction:column; gap:6px; }
    .lib-track { display:flex; align-items:center; gap:10px; background:rgba(0,20,16,0.65); border:1px solid rgba(0,255,200,0.08); border-radius:8px; padding:10px 12px; cursor:pointer; transition:all .2s; }
    .lib-track:hover { border-color:rgba(0,255,200,0.2); }
    .lib-track.playing { border-color:rgba(0,255,200,0.28); box-shadow:0 0 20px rgba(0,212,180,0.1); }
    .lib-icon { width:28px; height:28px; border-radius:50%; flex-shrink:0; background:rgba(0,40,30,0.9); border:1px solid rgba(0,212,180,0.2); display:flex; align-items:center; justify-content:center; font-size:12px; }
    .lib-track.playing .lib-icon { border-color:var(--accent); box-shadow:0 0 12px rgba(0,212,180,0.3); animation:iconBreath 2.5s ease-in-out infinite; }
    @keyframes iconBreath { 0%,100%{box-shadow:0 0 12px rgba(0,212,180,0.3)} 50%{box-shadow:0 0 24px rgba(0,255,200,0.5)} }
    .lib-info { flex:1; min-width:0; }
    .lib-name { font-family:'Cinzel',serif; font-size:11px; color:var(--text); letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .lib-track.playing .lib-name { color:var(--glow1); text-shadow:0 0 12px rgba(0,255,200,0.4); }
    .lib-dur { font-size:9px; color:rgba(0,212,180,0.5); font-family:'Cinzel',serif; flex-shrink:0; }
    .lib-add { background:none; border:1px solid rgba(0,212,180,0.2); color:var(--accent); font-size:16px; width:26px; height:26px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; touch-action:manipulation; }
    .lib-add:hover { background:rgba(0,212,180,0.12); border-color:rgba(0,212,180,0.4); }

    #chat-panel { background:rgba(2,8,14,0.55); }
    #messages { flex:1; min-height:0; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:8px; overscroll-behavior:contain; -webkit-overflow-scrolling:touch; }
    #messages::-webkit-scrollbar { width:0; }
    .msg { display:flex; flex-direction:column; gap:3px; }
    .mname { font-size:9px; color:var(--accent2); letter-spacing:.1em; text-transform:uppercase; font-family:'Cinzel',serif; }
    .mbody { font-family:'Raleway',sans-serif; font-size:15px; font-weight:300; color:var(--text); line-height:1.4; }
    .msg:not(.sys) .mbody { background:rgba(0,30,24,0.75); border:1px solid rgba(0,255,200,0.08); box-shadow:inset 0 1px 0 rgba(0,255,200,0.06),0 2px 12px rgba(0,0,0,0.2); border-radius:14px; padding:8px 14px; max-width:85%; }
    .msg.me { align-items:flex-end; }
    .msg.me .mbody { color:var(--glow1); text-shadow:0 0 12px rgba(0,255,180,0.4),0 0 24px rgba(0,255,180,0.12); border-color:rgba(0,255,180,0.16); background:rgba(0,40,28,0.80); box-shadow:0 0 18px rgba(0,255,180,0.1),inset 0 1px 0 rgba(0,255,200,0.1); }
    .msg.sys { align-items:center; }
    .msg.sys .mbody { font-size:10px; color:var(--muted); font-style:italic; letter-spacing:.08em; background:none; border:none; box-shadow:none; padding:0; }
    #cbar { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:8px 12px; padding-bottom:max(8px,env(safe-area-inset-bottom)); background:rgba(2,8,14,0.95); border-top:1px solid rgba(0,255,200,0.07); }
    #cin { flex:1; min-width:0; background:rgba(2,16,22,0.80); border:1px solid rgba(0,212,180,0.16); color:var(--text); font-family:'Raleway',sans-serif; font-size:16px; font-weight:200; padding:9px 16px; border-radius:22px; outline:none; transition:border-color .2s; }
    #cin:focus { border-color:rgba(0,212,180,0.38); }
    #cin::placeholder { color:var(--muted); font-style:italic; font-size:13px; }
    #sbtn { flex-shrink:0; width:36px; height:36px; border-radius:50%; background:rgba(4,22,30,0.85); border:1px solid rgba(0,212,180,0.32); color:var(--accent); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; }
    #sbtn:active { background:rgba(0,153,170,0.38); }

    @media (min-width:640px) {
      #tabs { display:none; }
      #sleep-panel, #chat-panel { display:flex !important; }
      #sleep-panel { flex:1; border-right:1px solid rgba(0,255,200,0.08); }
      #chat-panel { width:300px; flex:none; }
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline preload="none"
  src="https://archive.org/download/avatar-peaceful-forests-of-pandora-music-ambience-in-4-k-w-videogameworlds-6kvg-3od-f-854_202604/Avatar%20%EF%BD%9C%20Peaceful%20Forests%20of%20Pandora%20Music%20%26%20Ambience%20in%204K%2C%20w%E2%A7%B8%20%20%40videogameworlds%20%5B6kvg3odF854%5D.webm#t=120">
</video>
<div id="bg-overlay"></div>
<div id="bg-spores"></div>
<div id="moonparticles"></div>

<div id="ctc">
  <div class="ctc-inner">
    <div class="ctc-moon">🌙</div>
    <span>touch to enter</span>
  </div>
</div>

<div id="lobby">
  <div class="lobby-emblem">🌙</div>
  <div class="lobby-text">
    <div class="lobby-title">goodnight my dear.</div>
    <div class="lobby-sub">sweet dreams ♥</div>
  </div>
  <div class="lobby-form">
    <input id="nin" placeholder="your name" maxlength="20" inputmode="text" autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();go()}"/>
    <button onclick="go()">enter ♥</button>
    <div class="watch-divider">or</div>
    <a href="index.html" class="watch-btn">🎬 watch room</a>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <div class="htitle">goodnight my dear.</div>
    <div class="dots">
      <div class="dot on"></div>
      <div class="dot" id="dp"></div>
      <div id="plbl">waiting...</div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" id="tab-sleep" onclick="switchTab('sleep')">🌙 sounds</button>
    <button class="tab" id="tab-chat" onclick="switchTab('chat')">💬 chat</button>
  </div>
  <div id="body">
    <div class="panel active" id="sleep-panel">
      <div id="sleep-scroll">
        <div id="nowplaying">
          <div class="np-label">now playing</div>
          <div class="np-title" id="np-title">—</div>
          <div class="np-sub" id="np-sub"></div>
          <div class="np-transport">
            <button class="np-btn" onclick="doPlay()">▶</button>
            <button class="np-btn" onclick="doPause()">⏸</button>
            <button class="np-btn" id="skip-btn" onclick="skipNext()">⏭ skip</button>
          </div>
          <div id="seek-wrap" class="np-seek">
            <input type="range" id="seek" min="0" max="100" step="0.1" value="0"
              oninput="onSeekInput(this.value)" onchange="onSeekCommit(this.value)"/>
            <span class="np-time" id="np-time"></span>
          </div>
          <div class="np-vol">
            <span>🔈</span>
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)"/>
            <span>🔊</span>
          </div>
          <div id="sync-pill">✦ synced</div>
        </div>

        <div class="sec-label">queue <span id="q-count" style="opacity:.5"></span></div>
        <div id="queue-list"></div>

        <div class="sec-label">add to queue</div>
        <div id="addinput">
          <input id="turl" placeholder="audio url or youtube link…" inputmode="url" autocomplete="off"
            onkeydown="if(event.key==='Enter'){event.preventDefault();addToQueue()}"/>
          <button onclick="addToQueue()">+ add</button>
        </div>

        <div class="sec-label">library</div>
        <div id="lib-list"></div>
      </div>
    </div>

    <div class="panel" id="chat-panel">
      <div id="messages"></div>
      <div id="cbar">
        <input id="cin" placeholder="goodnight…" autocomplete="off"
          onkeydown="if(event.key==='Enter'){event.preventDefault();send()}"/>
        <button id="sbtn" onclick="send()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── moon particles — created once, no ongoing JS cost ── */
const mp = document.getElementById('moonparticles');
for (let i=0;i<12;i++){  /* reduced from 18 */
  const m=document.createElement('div');m.className='mote';const sz=Math.random()*3+1;
  m.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;--drift:${(Math.random()-.5)*60}px;animation-duration:${Math.random()*20+15}s;animation-delay:${Math.random()*20}s;`;
  mp.appendChild(m);
}

/* ── bg video ── */
const bgVid = document.getElementById('bg-video');
bgVid.addEventListener('canplay',()=>{ if(bgVid.currentTime<120) bgVid.currentTime=120; },{once:true});
document.getElementById('ctc').addEventListener('click',()=>{
  bgVid.play().catch(()=>{});
  document.getElementById('ctc').classList.add('hide');
  setTimeout(()=>document.getElementById('ctc').remove(),600);
},{once:true});

/* ── globals ── */
let db,dbRef,dbSet,dbPush,dbOnValue,dbOnDisconnect;
let me='', currentKey=null;
let audio=null, ytPlayer=null, ytReady=false, ytMode=false;
let syncing=false, hbTimer=null, seekRafId=null, seekDragging=false;
let queue=[];
const seen=new Set();
const HB=5000, DRIFT=3, ROOM='sleeproom';

const LIBRARY=[
  {key:'lib_1', name:'Avatar: Way of Water — Ocean', icon:'🌊', url:'https://files.catbox.moe/5bij9r.m4a'},
];

/* ── Piped instances for YT audio extraction ── */
const PIPED=[
  'https://pipedapi.kavin.rocks',
  'https://pipedapi.darkness.services',
  'https://piped-api.garudalinux.org',
];

/* ── YouTube IFrame API ── */
let ytApiReady=false;
const tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
function onYouTubeIframeAPIReady(){ ytApiReady=true; }

/* ── Helpers ── */
const durCache={};
function fmtSec(s){
  if(!isFinite(s)||s<0) return '';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${m}:${String(sc).padStart(2,'0')}`;
}
function loadDur(url,cb){
  if(durCache[url]!==undefined){cb(durCache[url]);return;}
  const a=new Audio();a.preload='metadata';
  a.addEventListener('loadedmetadata',()=>{durCache[url]=a.duration;cb(a.duration);a.src='';});
  a.addEventListener('error',()=>{durCache[url]=0;cb(0);});
  a.src=url;
}
function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:null;
}
function setNpTitle(t){ document.getElementById('np-title').textContent=t; }
function setNpSub(t){ document.getElementById('np-sub').textContent=t; }

/* ── Seek bar — rAF-based, zero setInterval cost ── */
function seekLoop(){
  if(!seekDragging){
    let cur=null,dur=null;
    if(ytMode&&ytPlayer&&ytReady){ try{cur=ytPlayer.getCurrentTime();dur=ytPlayer.getDuration();}catch(e){} }
    else if(audio){ cur=audio.currentTime; dur=audio.duration; }
    if(cur!==null){
      const ok=isFinite(dur)&&dur>0;
      const wrap=document.getElementById('seek-wrap');
      wrap.style.display=ok?'flex':'none';
      if(ok){
        const pct=(cur/dur)*100;
        const s=document.getElementById('seek');
        s.value=pct;
        s.style.background=`linear-gradient(to right,var(--accent) ${pct}%,rgba(0,212,180,0.2) ${pct}%)`;
        document.getElementById('np-time').textContent=`${fmtSec(cur)} / ${fmtSec(dur)}`;
      }
    }
  }
  seekRafId=requestAnimationFrame(seekLoop);
}
function startSeek(){ if(!seekRafId) seekRafId=requestAnimationFrame(seekLoop); }
function stopSeek(){ if(seekRafId){cancelAnimationFrame(seekRafId);seekRafId=null;} }

function onSeekInput(v){
  seekDragging=true;
  const pct=parseFloat(v);
  document.getElementById('seek').style.background=`linear-gradient(to right,var(--accent) ${pct}%,rgba(0,212,180,0.2) ${pct}%)`;
}
function onSeekCommit(v){
  seekDragging=false;
  let dur=null;
  if(ytMode&&ytPlayer&&ytReady){ try{dur=ytPlayer.getDuration();}catch(e){} }
  else if(audio){ dur=audio.duration; }
  if(!dur||!isFinite(dur)) return;
  const t=(parseFloat(v)/100)*dur;
  if(ytMode&&ytPlayer&&ytReady) ytPlayer.seekTo(t,true);
  else if(audio) audio.currentTime=t;
  if(db) pushState(isPlaying()?'play':'pause',t);
}
function isPlaying(){
  if(ytMode&&ytPlayer&&ytReady){ try{return ytPlayer.getPlayerState()===YT.PlayerState.PLAYING;}catch(e){} }
  if(audio) return !audio.paused;
  return false;
}

/* ── Piped fetch ── */
async function fetchPipedAudio(videoId){
  for(const base of PIPED){
    try{
      const res=await fetch(`${base}/streams/${videoId}`,{signal:AbortSignal.timeout(7000)});
      if(!res.ok) continue;
      const data=await res.json();
      if(!data.audioStreams?.length) continue;
      const streams=data.audioStreams.filter(s=>!s.videoOnly);
      streams.sort((a,b)=>b.bitrate-a.bitrate);
      return {url:streams[0].url, title:data.title||null};
    }catch(e){ continue; }
  }
  return null;
}

/* ── YT player (iframe, for videos that Piped can't serve or for visual) ── */
let ytContainer=null;
function _buildYTPlayer(videoId,name,key,autoplay){
  // create a hidden container if needed
  if(!ytContainer){
    ytContainer=document.createElement('div');
    ytContainer.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;';
    document.body.appendChild(ytContainer);
  }
  ytContainer.innerHTML='<div id="yt-iframe-el"></div>';
  if(ytPlayer){ try{ytPlayer.destroy();}catch(e){} ytPlayer=null; }
  ytReady=false; ytMode=true; currentKey=key;
  setNpTitle(name||videoId); setNpSub('⏳ loading…');
  const vol=Math.round(parseFloat(document.getElementById('vol').value)*100);
  ytPlayer=new YT.Player('yt-iframe-el',{
    width:'1',height:'1',videoId,
    playerVars:{autoplay:autoplay?1:0,controls:0,playsinline:1,origin:location.origin},
    events:{
      onReady(e){
        ytReady=true; e.target.setVolume(vol);
        setNpSub('▶ youtube');
        if(autoplay) e.target.playVideo();
        startSeek();
      },
      onError(e){
        const msgs={2:'invalid id',5:'html5 error',100:'not found',101:'embedding disabled',150:'embedding disabled'};
        setNpSub('⚠ '+(msgs[e.data]||'yt error '+e.data));
        ytMode=false;
      },
      onStateChange(e){
        if(!ytMode) return;
        if(e.data===YT.PlayerState.ENDED){ skipNext(); return; }
        if(e.data===YT.PlayerState.PLAYING&&!syncing){ pushState('play',ytPlayer.getCurrentTime()); startHB(); }
        if(e.data===YT.PlayerState.PAUSED&&!syncing){ pushState('pause',ytPlayer.getCurrentTime()); stopHB(); }
      }
    }
  });
  renderQueue(); renderLib();
}

/* ── Play YT: try Piped first, fall back to iframe ── */
async function playYT(url,name,key,autoplay){
  stopAll();
  const id=ytId(url);
  if(!id){ setNpSub('⚠ invalid youtube url'); return; }
  currentKey=key;
  setNpTitle(name||url); setNpSub('⏳ fetching audio…');
  renderQueue(); renderLib();

  const result=await fetchPipedAudio(id);
  if(result){
    // got direct stream — play as plain audio, no ads, no iframe
    const finalName=(name&&!name.startsWith('YT:'))?name:(result.title||name||url);
    setNpTitle(finalName);
    playAudio(result.url,finalName,key,autoplay);
    setNpSub('▶ youtube · no ads');
  } else {
    // Piped failed — fall back to hidden iframe (may have ads)
    setNpSub('⚠ piped failed, using iframe…');
    if(!ytApiReady){
      const poll=setInterval(()=>{ if(ytApiReady){ clearInterval(poll); _buildYTPlayer(id,name,key,autoplay); } },100);
    } else {
      _buildYTPlayer(id,name,key,autoplay);
    }
  }
}

/* ── Plain audio ── */
function playAudio(url,name,key,autoplay){
  // stop YT if active
  if(ytMode&&ytPlayer&&ytReady){ try{ytPlayer.stopVideo();}catch(e){} }
  ytMode=false;
  if(audio){ audio.pause(); audio.src=''; audio=null; }
  stopHB();

  audio=new Audio(url);
  audio.loop=false;
  audio.volume=parseFloat(document.getElementById('vol').value);
  currentKey=key;
  setNpTitle(name||url);
  renderQueue(); renderLib();
  startSeek();

  audio.addEventListener('play', ()=>{ if(!syncing){ pushState('play',audio.currentTime); startHB(); } });
  audio.addEventListener('pause',()=>{ if(!syncing){ pushState('pause',audio.currentTime); stopHB(); } });
  audio.addEventListener('ended',()=>skipNext());
  audio.addEventListener('error',()=>setNpSub('⚠ could not load — check url'));

  if(autoplay) audio.play().catch(()=>setNpSub('⚠ tap ▶ to start'));
}

function stopAll(){
  stopSeek(); stopHB();
  if(ytMode&&ytPlayer&&ytReady){ try{ytPlayer.stopVideo();}catch(e){} }
  ytMode=false;
  if(audio){ audio.pause(); audio.src=''; audio=null; }
  document.getElementById('seek-wrap').style.display='none';
  document.getElementById('seek').value=0;
  document.getElementById('np-time').textContent='';
}

function playItem(item,autoplay=true){
  if(ytId(item.url)) playYT(item.url,item.name,item.key,autoplay);
  else               playAudio(item.url,item.name,item.key,autoplay);
}

/* ── Controls ── */
function doPlay(){
  if(ytMode&&ytPlayer&&ytReady) ytPlayer.playVideo();
  else if(audio) audio.play().catch(()=>{});
}
function doPause(){
  if(ytMode&&ytPlayer&&ytReady) ytPlayer.pauseVideo();
  else if(audio) audio.pause();
}
function setVol(v){
  const p=parseFloat(v)*100;
  document.getElementById('vol').style.background=`linear-gradient(to right,var(--accent) ${p}%,rgba(0,212,180,0.2) ${p}%)`;
  if(ytMode&&ytPlayer&&ytReady) ytPlayer.setVolume(p);
  else if(audio) audio.volume=parseFloat(v);
}
function currentTime(){
  if(ytMode&&ytPlayer&&ytReady){ try{return ytPlayer.getCurrentTime();}catch(e){} }
  if(audio) return audio.currentTime;
  return null;
}

/* ── Queue ── */
function renderQueue(){
  const el=document.getElementById('queue-list'); el.innerHTML='';
  document.getElementById('q-count').textContent=queue.length?`(${queue.length})`:'';
  if(!queue.length){ el.innerHTML='<div class="q-empty">empty — tap + on a track or paste a link</div>'; return; }
  const frag=document.createDocumentFragment();
  queue.forEach((item,i)=>{
    const active=item.key===currentKey;
    const div=document.createElement('div');
    div.className='q-item'+(active?' q-active':'');
    const badge=ytId(item.url)?'<span class="q-badge">yt</span>':'';
    div.innerHTML=`<div class="q-pos">${active?'♪':i+1}</div><div class="q-name">${item.name||item.url}</div>${badge}<button class="q-del" title="remove">×</button>`;
    div.querySelector('.q-del').addEventListener('click',e=>{ e.stopPropagation(); removeFromQueue(i); });
    div.addEventListener('click',()=>playFromQueue(i));
    frag.appendChild(div);
  });
  el.appendChild(frag);
}

function pushQueue(){ if(db) dbSet(dbRef(db,`${ROOM}/queue`),queue.length?queue:null); }

function removeFromQueue(i){
  const wasPlaying=queue[i]&&queue[i].key===currentKey;
  queue.splice(i,1); pushQueue();
  if(wasPlaying) skipNext();
}
function playFromQueue(i){
  if(i>0) queue=[...queue.slice(i),...queue.slice(0,i)];
  pushQueue();
  if(db) dbSet(dbRef(db,`${ROOM}/nowplaying`),{...queue[0],by:me,ts:Date.now()});
  playItem(queue[0],true);
  pushState('play',0);
}
function addToQueue(){
  const inp=document.getElementById('turl'); const url=inp.value.trim(); if(!url) return;
  const isYt=!!ytId(url);
  const raw=url.split('/').pop().replace(/\.[^.]+$/,'').replace(/%20/g,' ').slice(0,48)||url;
  const name=isYt?'YT: '+url.slice(-20):raw;
  const item={key:'q_'+Date.now(),name,url,icon:isYt?'▶':'🎵'};
  queue.push(item); pushQueue(); inp.value='';
  if(!currentKey){
    if(db) dbSet(dbRef(db,`${ROOM}/nowplaying`),{...item,by:me,ts:Date.now()});
    playItem(item,true); pushState('play',0);
  }
}
function skipNext(){
  if(queue.length&&queue[0].key===currentKey) queue.shift();
  pushQueue();
  if(queue.length){
    if(db) dbSet(dbRef(db,`${ROOM}/nowplaying`),{...queue[0],by:me,ts:Date.now()});
    playItem(queue[0],true); pushState('play',0);
  } else {
    stopAll(); currentKey=null; setNpTitle('—'); setNpSub(''); renderLib();
  }
}

/* ── Library ── */
function addLibToQueue(key){
  const item=LIBRARY.find(l=>l.key===key); if(!item) return;
  const q={key:'q_'+Date.now(),name:item.name,url:item.url,icon:item.icon||'🎵'};
  queue.push(q); pushQueue();
  if(!currentKey){
    if(db) dbSet(dbRef(db,`${ROOM}/nowplaying`),{...q,by:me,ts:Date.now()});
    playItem(q,true); pushState('play',0);
  }
}
function renderLib(){
  const el=document.getElementById('lib-list'); el.innerHTML='';
  const frag=document.createDocumentFragment();
  LIBRARY.forEach(tr=>{
    const playing=tr.key===currentKey;
    const div=document.createElement('div'); div.className='lib-track'+(playing?' playing':'');
    div.innerHTML=`<div class="lib-icon">${playing?'🔊':(tr.icon||'🎵')}</div><div class="lib-info"><div class="lib-name">${tr.name}</div></div><span class="lib-dur" id="ldur-${tr.key}">—</span><button class="lib-add" title="add to queue">+</button>`;
    div.querySelector('.lib-add').addEventListener('click',e=>{ e.stopPropagation(); addLibToQueue(tr.key); });
    div.addEventListener('click',()=>addLibToQueue(tr.key));
    frag.appendChild(div);
    loadDur(tr.url,d=>{ const e2=document.getElementById(`ldur-${tr.key}`); if(e2) e2.textContent=fmtSec(d)||'—'; });
  });
  el.appendChild(frag);
}

/* ── Sync ── */
function pushState(action,t){
  if(!db) return;
  dbSet(dbRef(db,`${ROOM}/audiostate`),{action,t:t||0,by:me,ts:Date.now()});
}
function applyState(s){
  if(s.by===me) return;
  syncing=true;
  const lag=Math.min((Date.now()-(s.ts||Date.now()))/1000,5);
  const seek=s.t+(s.action==='play'?lag:0);
  if(ytMode&&ytPlayer&&ytReady){
    ytPlayer.seekTo(seek,true);
    if(s.action==='play'){ ytPlayer.playVideo(); startHB(); } else ytPlayer.pauseVideo();
  } else if(audio){
    audio.currentTime=seek;
    if(s.action==='play'){ audio.play().catch(()=>{}); startHB(); } else audio.pause();
  }
  setTimeout(()=>{ syncing=false; },800);
  showPill();
}
function showPill(){ const p=document.getElementById('sync-pill'); p.classList.add('on'); setTimeout(()=>p.classList.remove('on'),2000); }
function startHB(){
  stopHB();
  hbTimer=setInterval(()=>{
    const t=currentTime(); if(t===null||!db) return;
    dbSet(dbRef(db,`${ROOM}/hb`),{t,by:me,ts:Date.now()});
  },HB);
}
function stopHB(){ clearInterval(hbTimer); hbTimer=null; }

/* ── Chat ── */
function addMsg(name,text,mine,sys=false){
  const box=document.getElementById('messages');
  const d=document.createElement('div'); d.className='msg'+(mine?' me':'')+(sys?' sys':'');
  d.innerHTML=sys?`<div class="mbody">${text}</div>`:`${!mine?`<div class="mname">${name}</div>`:''}<div class="mbody">${text}</div>`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}
function send(){
  const i=document.getElementById('cin'), t=i.value.trim(); if(!t) return;
  dbPush(dbRef(db,`${ROOM}/messages`),{name:me,text:t,ts:Date.now()});
  i.value=''; i.focus();
}

/* ── Tabs ── */
function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab+'-panel').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='chat'){ const m=document.getElementById('messages'); setTimeout(()=>m.scrollTop=m.scrollHeight,50); }
}

/* ── Init ── */
async function go(){
  const n=document.getElementById('nin').value.trim(); if(!n) return;
  me=n;
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const fb=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  dbRef=fb.ref; dbSet=fb.set; dbPush=fb.push; dbOnValue=fb.onValue; dbOnDisconnect=fb.onDisconnect;
  const FB={apiKey:'AIzaSyBSEbVyZtl0qTHvzprqhielKPWL8vYTOw4',authDomain:'iwannawatchsomethingwithyou.firebaseapp.com',databaseURL:'https://iwannawatchsomethingwithyou-default-rtdb.firebaseio.com',projectId:'iwannawatchsomethingwithyou',storageBucket:'iwannawatchsomethingwithyou.firebasestorage.app',messagingSenderId:'968886424536',appId:'1:968886424536:web:869a6687bc26671c3fd8ad'};
  db=fb.getDatabase(initializeApp(FB));
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').classList.add('on');
  renderLib(); presence(); listen();
  dbPush(dbRef(db,`${ROOM}/messages`),{name:'—',text:`${me} is here 🌙`,sys:true,ts:Date.now()});
}

function presence(){
  const pr=dbRef(db,`${ROOM}/presence/${me}`);
  dbSet(pr,{name:me}); dbOnDisconnect(pr).remove();
  dbOnValue(dbRef(db,`${ROOM}/presence`),snap=>{
    const d=snap.val()||{}, others=Object.keys(d).filter(u=>u!==me);
    const dot=document.getElementById('dp'), lbl=document.getElementById('plbl');
    if(others.length){ dot.classList.add('on'); lbl.textContent=others[0]+' is here ♥'; }
    else { dot.classList.remove('on'); lbl.textContent='waiting...'; }
  });
}

function listen(){
  /* queue — only re-render if content actually changed */
  let lastQueueJson='';
  dbOnValue(dbRef(db,`${ROOM}/queue`),snap=>{
    const raw=snap.val()||[];
    const j=JSON.stringify(raw);
    if(j===lastQueueJson) return;
    lastQueueJson=j;
    queue=raw; renderQueue();
  });

  /* now playing — only act if key changed */
  dbOnValue(dbRef(db,`${ROOM}/nowplaying`),snap=>{
    const np=snap.val();
    if(!np||np.by===me) return;
    if(np.key!==currentKey) playItem({key:np.key,name:np.name,url:np.url},false);
  });

  /* playback state */
  dbOnValue(dbRef(db,`${ROOM}/audiostate`),snap=>{
    const s=snap.val(); if(!s||s.by===me) return;
    applyState(s);
  });

  /* heartbeat drift correction */
  dbOnValue(dbRef(db,`${ROOM}/hb`),snap=>{
    const h=snap.val(); if(!h||h.by===me) return;
    const t=currentTime(); if(t===null) return;
    if(Math.abs(t-h.t)>DRIFT){
      syncing=true;
      if(ytMode&&ytPlayer&&ytReady) ytPlayer.seekTo(h.t+0.3,true);
      else if(audio) audio.currentTime=h.t+0.3;
      showPill(); setTimeout(()=>{ syncing=false; },800);
    }
  });

  /* messages */
  dbOnValue(dbRef(db,`${ROOM}/messages`),snap=>{
    const msgs=snap.val(); if(!msgs) return;
    Object.entries(msgs).forEach(([k,m])=>{
      if(!seen.has(k)){ seen.add(k); addMsg(m.name,m.text,m.name===me,m.sys); }
    });
  });
}
