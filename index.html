<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>just us</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0a0e; --bg2: #110f14; --bg3: #1a1720;
      --border: rgba(180,140,160,0.12);
      --accent: #c9899a; --accent2: #8b5e70;
      --text: #e8dde4; --muted: #7a6e78;
      --glow: rgba(201,137,154,0.15);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── LOBBY ── */
    #lobby {
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 28px; padding: 20px;
    }
    .lobby-title {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 7vw, 4rem);
      font-weight: 200; font-style: italic; color: var(--text);
      text-shadow: 0 0 80px var(--glow); text-align: center;
    }
    .lobby-sub { color: var(--muted); font-size: 10px; letter-spacing: .18em; text-transform: uppercase; }
    .lobby-form { display: flex; flex-direction: column; gap: 12px; width: min(300px, 90vw); }
    .lobby-form input {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      font-size: 16px; font-family: 'DM Mono', monospace;
      padding: 14px 16px; border-radius: 4px; outline: none;
      text-align: center; letter-spacing: .06em;
    }
    .lobby-form input::placeholder { color: var(--muted); }
    .lobby-form input:focus { border-color: var(--accent2); }
    .lobby-form button {
      background: transparent; border: 1px solid var(--accent2); color: var(--accent);
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em;
      text-transform: uppercase; padding: 14px; border-radius: 4px; cursor: pointer;
    }
    .lobby-form button:active { background: var(--glow); }

    #app { display: none; }
    #app.on { display: block; }

    #top {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex; flex-direction: column;
      background: var(--bg);
    }

    #hdr {
      display: flex; align-items: center; gap: 12px;
      height: 40px; padding: 0 14px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .htitle {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.15rem; font-weight: 300; color: var(--accent); margin-right: auto;
    }
    .dots { display: flex; gap: 6px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
    .dot.on { background: var(--accent); box-shadow: 0 0 6px var(--glow); }
    #plbl { font-size: 10px; color: var(--muted); }

    #ubar {
      display: flex; align-items: center; gap: 8px;
      height: 48px; padding: 0 12px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    #ubar input {
      flex: 1; min-width: 0;
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 16px;
      padding: 7px 10px; border-radius: 3px; outline: none;
    }
    #ubar input:focus { border-color: var(--accent2); }
    #ubar input::placeholder { color: var(--muted); font-size: 12px; }
    #ubar button {
      flex-shrink: 0;
      background: var(--accent2); border: none; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 11px;
      padding: 8px 14px; border-radius: 3px; cursor: pointer;
    }
    #ubar button:active { opacity: .7; }

    #vid {
      width: 100%; aspect-ratio: 16/9;
      background: #000; position: relative; flex-shrink: 0;
    }
    #vid iframe, #vid video {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    #vid video { object-fit: contain; background: #000; }
    #empty {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; color: var(--muted);
    }
    #empty svg { opacity: .2; }
    #empty p { font-size: 11px; letter-spacing: .1em; }

    #ctrls {
      display: flex; align-items: center; gap: 8px;
      height: 40px; padding: 0 12px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .cb {
      background: none; border: 1px solid var(--border); color: var(--text);
      border-radius: 3px; padding: 5px 12px; font-size: 12px;
      font-family: 'DM Mono', monospace; cursor: pointer; touch-action: manipulation;
    }
    .cb:active { border-color: var(--accent2); color: var(--accent); }
    #stbar { flex: 1; font-size: 10px; color: var(--muted); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    #spill { font-size: 9px; color: var(--accent2); border: 1px solid var(--accent2); border-radius: 20px; padding: 2px 7px; opacity: 0; transition: opacity .3s; }
    #spill.on { opacity: 1; }

    #chat {
      position: fixed;
      left: 0; right: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      z-index: 10;
    }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 0; }

    .msg { display: flex; flex-direction: column; gap: 2px; }
    .mname { font-size: 10px; color: var(--accent); }
    .mbody {
      font-family: 'Cormorant Garamond', serif; font-size: 17px;
      font-weight: 300; color: var(--text); line-height: 1.4;
    }
    .msg.me { align-items: flex-end; }
    .msg.me .mbody { color: var(--accent); }
    .msg.sys .mbody { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); font-style: italic; }

    #cbar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: var(--bg2); border-top: 1px solid var(--border);
    }
    #cbar input {
      flex: 1; min-width: 0;
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      font-family: 'Cormorant Garamond', serif; font-size: 16px;
      padding: 9px 14px; border-radius: 20px; outline: none;
    }
    #cbar input:focus { border-color: var(--accent2); }
    #cbar input::placeholder { color: var(--muted); font-style: italic; font-size: 14px; }
    #sbtn {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent2); border: none; color: var(--text);
      font-size: 15px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; touch-action: manipulation;
    }
    #sbtn:active { opacity: .7; }

    /* ── DESKTOP ── */
    @media (min-width: 640px) {
      #app.on {
        display: grid; height: 100vh;
        grid-template-columns: 1fr 300px;
        grid-template-rows: 40px 48px 1fr 40px;
        grid-template-areas: "h c" "u c" "v c" "k c";
      }
      #top { position: static; display: contents; }
      #hdr  { grid-area: h; }
      #ubar { grid-area: u; height: auto; }
      #vid  { grid-area: v; aspect-ratio: unset; height: 100%; }
      #ctrls{ grid-area: k; height: auto; }
      #chat {
        grid-area: c; position: static;
        border-left: 1px solid var(--border);
        height: auto !important; top: auto !important;
      }
    }
  </style>
</head>
<body>

<div id="lobby">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="lobby-title">i want to watch something with you.</div>
    <div class="lobby-sub">i miss u</div>
  </div>
  <div class="lobby-form">
    <input id="nin" placeholder="your name" maxlength="20" inputmode="text" autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();go()}"/>
    <button onclick="go()">enter ♥</button>
  </div>
</div>

<div id="app">
  <div id="top">
    <div id="hdr">
      <div class="htitle">just us.</div>
      <div class="dots">
        <div class="dot on"></div>
        <div class="dot" id="dp"></div>
        <div id="plbl">waiting...</div>
      </div>
    </div>
    <div id="ubar">
      <input id="yurl" placeholder="youtube or direct video url…" inputmode="url" autocomplete="off"
        onkeydown="if(event.key==='Enter'){event.preventDefault();loadVid()}"/>
      <button onclick="loadVid()">load</button>
    </div>
    <div id="vid">
      <div id="empty">
        <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <p>paste a youtube or video link above</p>
      </div>
    </div>
    <div id="ctrls">
      <button class="cb" onclick="cPlay()">▶</button>
      <button class="cb" onclick="cPause()">⏸</button>
      <span id="stbar"></span>
      <span id="spill">synced</span>
    </div>
  </div>

  <div id="chat">
    <div id="messages"></div>
    <div id="cbar">
      <input id="cin" placeholder="say something…" autocomplete="off"
        onkeydown="if(event.key==='Enter'){event.preventDefault();send()}"/>
      <button id="sbtn" onclick="send()">↑</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey: "AIzaSyBSEbVyZtl0qTHvzprqhielKPWL8vYTOw4",
  authDomain: "iwannawatchsomethingwithyou.firebaseapp.com",
  databaseURL: "https://iwannawatchsomethingwithyou-default-rtdb.firebaseio.com",
  projectId: "iwannawatchsomethingwithyou",
  storageBucket: "iwannawatchsomethingwithyou.firebasestorage.app",
  messagingSenderId: "968886424536",
  appId: "1:968886424536:web:869a6687bc26671c3fd8ad"
};

const ROOM = "justus", DRIFT = 2.5, HB = 3000;
const db = getDatabase(initializeApp(FB));

let me='', player=null, nativeVid=null, mode=null; // mode: 'yt' | 'native'
let ready=false, syncing=false;
let pendSt=null, pendVid=null, ytOk=false, hbTimer=null;
const ytQ=[], seen=new Set();

// ── layout ────────────────────────────────────────────────────────
function layout() {
  if (window.innerWidth >= 640) return;
  const topEl  = document.getElementById('top');
  const chatEl = document.getElementById('chat');
  if (!topEl || !chatEl) return;
  const topH = topEl.getBoundingClientRect().height;
  const vv   = window.visualViewport;
  const visBottom = vv ? vv.offsetTop + vv.height : window.innerHeight;
  chatEl.style.top    = topH + 'px';
  chatEl.style.height = (visBottom - topH) + 'px';
}
window.visualViewport?.addEventListener('resize', layout);
window.visualViewport?.addEventListener('scroll', layout);
window.addEventListener('resize', layout);

// ── YouTube API ───────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = () => {
  ytOk = true; ytQ.forEach(f=>f()); ytQ.length=0;
  if (pendVid) { mkYT(pendVid); pendVid=null; }
};
function ytScript() {
  if (document.querySelector('script[src*="youtube.com/iframe_api"]')) return;
  const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s);
}

// ── detect url type ───────────────────────────────────────────────
function ytId(url) {
  const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function isDirectVideo(url) {
  // matches .mp4, .webm, .ogg, .mkv, or archive.org links
  return /\.(mp4|webm|ogg|mov|mkv)(\?|$)/i.test(url)
    || url.includes('archive.org/download')
    || url.includes('ia800');
}

// ── clear video area ──────────────────────────────────────────────
function clearVid() {
  const vidEl = document.getElementById('vid');
  // remove YT iframe
  const yp = document.getElementById('yp'); if (yp) yp.remove();
  // remove native video
  const nv = document.getElementById('nv'); if (nv) nv.remove();
  player = null; nativeVid = null; mode = null; ready = false;
  document.getElementById('empty').style.display = 'flex';
}

// ── make YouTube player ───────────────────────────────────────────
function mkYT(id) {
  if (!ytOk) { pendVid = id; ytScript(); return; }
  clearVid();
  mode = 'yt';
  document.getElementById('empty').style.display = 'none';
  const d = document.createElement('div'); d.id = 'yp';
  document.getElementById('vid').appendChild(d);
  player = new YT.Player('yp', {
    videoId: id,
    playerVars: { autoplay:1, controls:1, rel:0, modestbranding:1, playsinline:1 },
    events: {
      onReady: () => { ready=true; if(pendSt){applyS(pendSt);pendSt=null;} },
      onStateChange: e => {
        if (syncing||!ready) return;
        const t = player.getCurrentTime();
        if (e.data===YT.PlayerState.PLAYING) { pushS('play',t);  startHB(); }
        if (e.data===YT.PlayerState.PAUSED)  { pushS('pause',t); stopHB();  }
      }
    }
  });
}

// ── make native video player ──────────────────────────────────────
function mkNative(url) {
  clearVid();
  mode = 'native';
  document.getElementById('empty').style.display = 'none';
  const v = document.createElement('video');
  v.id = 'nv';
  v.src = url;
  v.controls = true;
  v.playsInline = true;
  v.preload = 'metadata'; // don't buffer everything on load
  document.getElementById('vid').appendChild(v);
  nativeVid = v;

  v.addEventListener('canplay', () => {
    ready = true;
    if (pendSt) { applyS(pendSt); pendSt = null; }
  });
  v.addEventListener('play', () => {
    if (syncing||!ready) return;
    pushS('play', v.currentTime); startHB();
  });
  v.addEventListener('pause', () => {
    if (syncing||!ready) return;
    pushS('pause', v.currentTime); stopHB();
  });
  v.addEventListener('seeked', () => {
    if (syncing) return;
    // broadcast seek
    pushS(v.paused ? 'pause' : 'play', v.currentTime);
  });
}

// ── heartbeat ─────────────────────────────────────────────────────
function startHB() {
  stopHB();
  hbTimer = setInterval(() => {
    const t = currentTime();
    if (t === null) return;
    const isPlaying = mode==='yt'
      ? player?.getPlayerState()===YT.PlayerState.PLAYING
      : nativeVid && !nativeVid.paused;
    if (isPlaying) set(ref(db,`${ROOM}/hb`),{t,by:me,ts:Date.now()});
  }, HB);
}
function stopHB() { clearInterval(hbTimer); hbTimer=null; }

function currentTime() {
  if (mode==='yt' && player?.getCurrentTime) return player.getCurrentTime();
  if (mode==='native' && nativeVid) return nativeVid.currentTime;
  return null;
}

// ── helpers ───────────────────────────────────────────────────────
function st(txt) { document.getElementById('stbar').textContent=txt; }
function pill() { const p=document.getElementById('spill'); p.classList.add('on'); setTimeout(()=>p.classList.remove('on'),2000); }

function addMsg(name,text,mine,sys=false) {
  const box=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg'+(mine?' me':'')+(sys?' sys':'');
  d.innerHTML=sys
    ?`<div class="mbody">${text}</div>`
    :`${!mine?`<div class="mname">${name}</div>`:''}<div class="mbody">${text}</div>`;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
}

// ── enter ─────────────────────────────────────────────────────────
window.go = () => {
  const n = document.getElementById('nin').value.trim();
  if (!n) return;
  me = n;
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').classList.add('on');
  requestAnimationFrame(layout);
  presence(); listen();
};

// ── presence ──────────────────────────────────────────────────────
function presence() {
  const pr = ref(db,`${ROOM}/presence/${me}`);
  set(pr,{name:me}); onDisconnect(pr).remove();
  onValue(ref(db,`${ROOM}/presence`), snap=>{
    const d=snap.val()||{}, others=Object.keys(d).filter(u=>u!==me);
    const dot=document.getElementById('dp'), lbl=document.getElementById('plbl');
    if (others.length) { dot.classList.add('on'); lbl.textContent=others[0]+' is here ♥'; }
    else { dot.classList.remove('on'); lbl.textContent='waiting...'; }
  });
}

// ── listeners ─────────────────────────────────────────────────────
function listen() {
  onValue(ref(db,`${ROOM}/video`), snap=>{
    const v=snap.val(); if(!v?.url) return;
    // only reload if url changed
    const curUrl = mode==='yt'
      ? player?.getVideoData?.()?.video_id
      : nativeVid?.src;
    if (v.url===curUrl) return;
    if (v.type==='yt') { ytScript(); mkYT(v.url); }
    else mkNative(v.url);
  });

  onValue(ref(db,`${ROOM}/state`), snap=>{
    const s=snap.val(); if(!s||s.by===me) return;
    if (!ready) { pendSt=s; return; }
    applyS(s);
  });

  onValue(ref(db,`${ROOM}/hb`), snap=>{
    const h=snap.val(); if(!h||h.by===me||!ready) return;
    const t=currentTime(); if(t===null) return;
    const drift=Math.abs(t - h.t);
    if (drift > DRIFT) {
      syncing=true;
      seekTo(h.t + 0.3);
      ensurePlaying();
      st(`↺ synced (${drift.toFixed(1)}s)`); pill();
      setTimeout(()=>{ syncing=false; }, 800);
    }
  });

  onValue(ref(db,`${ROOM}/messages`), snap=>{
    const messages=snap.val(); if(!messages) return;
    Object.entries(messages).forEach(([k,m])=>{
      if(!seen.has(k)){seen.add(k);addMsg(m.name,m.text,m.name===me,m.sys);}
    });
  });
}

function seekTo(t) {
  if (mode==='yt') player?.seekTo(t, true);
  else if (nativeVid) nativeVid.currentTime = t;
}
function ensurePlaying() {
  if (mode==='yt') { if(player?.getPlayerState()!==YT.PlayerState.PLAYING) player.playVideo(); }
  else if (nativeVid && nativeVid.paused) nativeVid.play();
}

function applyS(s) {
  if (!ready) return;
  syncing=true;
  const lag = Math.min((Date.now()-(s.ts||Date.now()))/1000, 5);
  seekTo(s.t + (s.a==='play' ? lag : 0));
  if (s.a==='play')  { ensurePlaying(); st('▶ synced'); startHB(); }
  if (s.a==='pause') {
    if (mode==='yt') player.pauseVideo();
    else if (nativeVid) nativeVid.pause();
    st('⏸ paused'); stopHB();
  }
  setTimeout(()=>{ syncing=false; }, 800);
}

function pushS(a, t) {
  set(ref(db,`${ROOM}/state`),{a,t,by:me,ts:Date.now()});
  st(a==='play' ? '▶ playing' : '⏸ paused');
}

// ── controls ──────────────────────────────────────────────────────
window.loadVid = () => {
  const url = document.getElementById('yurl').value.trim();
  if (!url) return;

  const id = ytId(url);
  if (id) {
    // YouTube
    set(ref(db,`${ROOM}/video`),{url:id, type:'yt'});
    ytScript(); mkYT(id);
    setTimeout(()=>pushS('pause',0), 400);
    push(ref(db,`${ROOM}/messages`),{name:'—',text:`${me} loaded a video`,sys:true,ts:Date.now()});
  } else if (isDirectVideo(url) || url.startsWith('http')) {
    // Direct / archive.org
    set(ref(db,`${ROOM}/video`),{url, type:'native'});
    mkNative(url);
    setTimeout(()=>pushS('pause',0), 400);
    push(ref(db,`${ROOM}/messages`),{name:'—',text:`${me} loaded a video`,sys:true,ts:Date.now()});
  } else {
    st('invalid url');
  }
};

window.cPlay = () => {
  if (!ready) return;
  const t = currentTime() ?? 0;
  ensurePlaying(); pushS('play', t); startHB();
};
window.cPause = () => {
  if (!ready) return;
  const t = currentTime() ?? 0;
  if (mode==='yt') player.pauseVideo();
  else if (nativeVid) nativeVid.pause();
  pushS('pause', t); stopHB();
};

window.send = () => {
  const i=document.getElementById('cin'), t=i.value.trim(); if(!t) return;
  push(ref(db,`${ROOM}/messages`),{name:me,text:t,ts:Date.now()});
  i.value=''; i.focus();
};
</script>
</body>
</html>
