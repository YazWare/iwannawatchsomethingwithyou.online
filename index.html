<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>just us.</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Mono&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#0c0a0e;
  color:#e8dde4;
  font-family:'DM Mono',monospace;
}

/* LOBBY */
#lobby{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  height:100vh;gap:20px;padding:20px;text-align:center;
}
input,button{
  width:100%;padding:12px;border:none;border-radius:6px;
}
button{background:#c9899a;color:white}

/* APP */
#app{display:none;height:100vh}
#app.visible{display:flex;flex-direction:column}

/* VIDEO */
#yt-wrapper{
  width:100%;
  aspect-ratio:16/9;
  background:black;
}
#yt-wrapper iframe{width:100%;height:100%}

/* CONTROLS */
.controls{
  display:flex;gap:10px;padding:10px;
}
.controls button{flex:1}

/* CHAT */
#chat{
  flex:1;display:flex;flex-direction:column;
}
#messages{
  flex:1;overflow-y:auto;padding:10px;
}
.msg{margin-bottom:8px;font-size:14px}

.chat-input{
  display:flex;gap:5px;padding:10px;
}
.chat-input input{flex:1}

/* DESKTOP */
@media(min-width:768px){
  #app{flex-direction:row}
  #left{flex:2}
  #chat{flex:1;border-left:1px solid #333}
}
</style>
</head>

<body>

<div id="lobby">
  <h2>watch together</h2>
  <input id="name" placeholder="your name"/>
  <button onclick="enter()">enter</button>
</div>

<div id="app">
  <div id="left">
    <input id="url" placeholder="youtube url"/>
    <button onclick="loadVideo()">load</button>

    <div id="yt-wrapper"></div>

    <div class="controls">
      <button onclick="play()">play</button>
      <button onclick="pause()">pause</button>
    </div>
  </div>

  <div id="chat">
    <div id="messages"></div>
    <div class="chat-input">
      <input id="msg"/>
      <button onclick="send()">send</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBSEbVyZtl0qTHvzprqhielKPWL8vYTOw4",
  authDomain: "iwannawatchsomethingwithyou.firebaseapp.com",
  databaseURL: "https://iwannawatchsomethingwithyou-default-rtdb.firebaseio.com",
  projectId: "iwannawatchsomethingwithyou",
  storageBucket: "iwannawatchsomethingwithyou.firebasestorage.app",
  messagingSenderId: "968886424536",
  appId: "1:968886424536:web:869a6687bc26671c3fd8ad",
  measurementId: "G-JCTP1MNZYN"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let name="";
let player;
let lastState;
let syncing=false;

// YT
const tag=document.createElement("script");
tag.src="https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

window.onYouTubeIframeAPIReady=()=>{};

function createPlayer(id){
  player=new YT.Player("yt-wrapper",{videoId:id});
}

// SYNC
function pushState(action,time){
  set(ref(db,"room/state"),{
    action,time,ts:Date.now(),by:name
  });
}

function applyState(s){
  if(!player)return;

  const delay=(Date.now()-s.ts)/1000;
  let target=s.time;

  if(s.action==="play")target+=delay;

  const diff=Math.abs(player.getCurrentTime()-target);

  if(diff>0.5){
    syncing=true;
    player.seekTo(target,true);
    setTimeout(()=>syncing=false,300);
  }

  if(s.action==="play")player.playVideo();
  if(s.action==="pause")player.pauseVideo();

  lastState=s;
}

// AUTO SYNC
setInterval(()=>{
  if(!player||!lastState||syncing)return;

  const delay=(Date.now()-lastState.ts)/1000;
  let target=lastState.time;
  if(lastState.action==="play")target+=delay;

  const diff=Math.abs(player.getCurrentTime()-target);

  if(diff>1)player.seekTo(target,true);

},2000);

// LISTEN
onValue(ref(db,"room/state"),snap=>{
  const s=snap.val();
  if(!s||s.by===name)return;
  applyState(s);
});

onValue(ref(db,"room/video"),snap=>{
  const v=snap.val();
  if(v)createPlayer(v.id);
});

onValue(ref(db,"room/chat"),snap=>{
  const data=snap.val()||{};
  const box=document.getElementById("messages");
  box.innerHTML="";
  Object.values(data).forEach(m=>{
    box.innerHTML+=`<div class="msg"><b>${m.name}:</b> ${m.text}</div>`;
  });
  box.scrollTop=box.scrollHeight;
});

// ACTIONS
window.enter=()=>{
  name=document.getElementById("name").value;
  document.getElementById("lobby").style.display="none";
  document.getElementById("app").classList.add("visible");
};

window.loadVideo=()=>{
  const url=document.getElementById("url").value;
  const id=url.split("v=")[1];
  set(ref(db,"room/video"),{id});
};

window.play=()=>{
  pushState("play",player.getCurrentTime());
};

window.pause=()=>{
  pushState("pause",player.getCurrentTime());
};

window.send=()=>{
  const input=document.getElementById("msg");
  push(ref(db,"room/chat"),{
    name,text:input.value
  });
  input.value="";
};
</script>

</body>
</html>
