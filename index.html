<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <!-- font-size=16 prevents iOS zoom on input focus -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
  <title>just us</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0a0e; --bg2: #110f14; --bg3: #1a1720;
      --border: rgba(180,140,160,0.12);
      --accent: #c9899a; --accent2: #8b5e70;
      --text: #e8dde4; --muted: #7a6e78;
      --glow: rgba(201,137,154,0.15);
    }

    html { height: 100%; background: var(--bg); }

    body {
      height: 100%;
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      -webkit-tap-highlight-color: transparent;
      /* KEY: let body scroll when keyboard pushes things */
      overflow: hidden;
    }

    /* grain */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .45;
    }

    /* ── LOBBY ── */
    #lobby {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 28px; padding: 20px;
      animation: fadeIn .8s ease;
    }
    .lobby-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 7vw, 4rem);
      font-weight: 200; font-style: italic; color: var(--text);
      text-shadow: 0 0 80px var(--glow); text-align: center;
    }
    .lobby-sub {
      color: var(--muted); font-size: 10px;
      letter-spacing: .18em; text-transform: uppercase;
    }
    .lobby-form { display: flex; flex-direction: column; gap: 12px; width: min(300px, 90vw); }
    .lobby-form input {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      font-family: 'DM Mono', monospace;
      /* 16px prevents iOS zoom */
      font-size: 16px;
      padding: 14px 16px; border-radius: 4px; outline: none;
      transition: border-color .2s, box-shadow .2s;
      text-align: center; letter-spacing: .06em;
    }
    .lobby-form input::placeholder { color: var(--muted); }
    .lobby-form input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--glow); }
    .lobby-form button {
      background: transparent; border: 1px solid var(--accent2); color: var(--accent);
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .14em;
      text-transform: uppercase; padding: 14px; border-radius: 4px; cursor: pointer;
      -webkit-appearance: none;
    }
    .lobby-form button:active { background: var(--glow); }

    /* ── APP ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #app.visible { display: flex; }

    /* ── HEADER ── */
    #app-header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 12px;
      padding: 0 14px; height: 40px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 1.15rem; font-weight: 300; color: var(--accent); margin-right: auto;
    }
    .presence { display: flex; gap: 7px; align-items: center; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .4s; }
    .dot.online { background: var(--accent); box-shadow: 0 0 6px var(--glow); }
    #presence-label { font-size: 10px; color: var(--muted); letter-spacing: .05em; }

    /* ── URL BAR ── */
    #url-bar {
      flex-shrink: 0;
      display: flex; gap: 8px; padding: 8px 12px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    #url-bar input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 16px; /* no zoom */
      padding: 8px 10px; border-radius: 3px; outline: none; min-width: 0;
      transition: border-color .2s;
    }
    #url-bar input:focus { border-color: var(--accent2); }
    #url-bar input::placeholder { color: var(--muted); font-size: 12px; }
    #url-bar button {
      background: var(--accent2); border: none; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 11px; padding: 8px 14px;
      border-radius: 3px; cursor: pointer; letter-spacing: .06em;
      white-space: nowrap; flex-shrink: 0; -webkit-appearance: none;
    }
    #url-bar button:active { opacity: .7; }

    /* ── VIDEO ── always fixed height, never squished ── */
    #video-block {
      flex-shrink: 0;
      /* 56.25% of viewport width = 16:9 */
      height: calc(100vw * 9 / 16);
      max-height: 42vh; /* don't let it eat the whole screen */
      position: relative;
      background: #000;
    }
    #video-block iframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .empty-state {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; color: var(--muted);
    }
    .empty-state svg { opacity: .22; }
    .empty-state p { font-size: 11px; letter-spacing: .1em; }

    /* ── CONTROLS strip ── */
    #controls {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .ctrl-btn {
      background: none; border: 1px solid var(--border); color: var(--text);
      cursor: pointer; border-radius: 3px; padding: 6px 12px;
      font-family: 'DM Mono', monospace; font-size: 12px;
      touch-action: manipulation; -webkit-appearance: none;
    }
    .ctrl-btn:active { border-color: var(--accent2); color: var(--accent); }
    #status-bar {
      flex: 1; font-size: 10px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .sync-pill {
      font-size: 9px; color: var(--accent2); border: 1px solid var(--accent2);
      border-radius: 20px; padding: 2px 7px; opacity: 0; transition: opacity .3s;
      white-space: nowrap;
    }
    .sync-pill.on { opacity: 1; }

    /* ── CHAT SECTION ── fills remaining space, scrollable ── */
    #chat-section {
      flex: 1;
      display: flex; flex-direction: column;
      min-height: 0;
      /* This is the key: overflow visible so the keyboard pushes the input up */
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex; flex-direction: column; gap: 10px;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    #messages::-webkit-scrollbar { width: 0; }

    /* message bubbles — Rave style: bigger, centered-ish */
    .msg { display: flex; flex-direction: column; gap: 2px; animation: msgIn .18s ease; }
    .msg-name { font-size: 10px; color: var(--accent); letter-spacing: .06em; }
    .msg-body {
      font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 300;
      color: var(--text); line-height: 1.45;
    }
    .msg.mine { align-items: flex-end; }
    .msg.mine .msg-body { color: var(--accent); }
    .msg.system .msg-body {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--muted); font-style: italic;
    }

    /* ── CHAT INPUT BAR ── sticks to bottom above keyboard ── */
    #chat-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      background: var(--bg2);
      border-top: 1px solid var(--border);
    }
    #chat-bar input {
      flex: 1;
      background: var(--bg3); border: 1px solid var(--border); color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      /* 16px prevents iOS auto-zoom */
      font-size: 16px;
      padding: 9px 14px; border-radius: 20px; outline: none; min-width: 0;
      transition: border-color .2s;
    }
    #chat-bar input:focus { border-color: var(--accent2); }
    #chat-bar input::placeholder { color: var(--muted); font-style: italic; font-size: 14px; }
    #send-btn {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent2); border: none; color: var(--text);
      font-size: 15px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; touch-action: manipulation;
    }
    #send-btn:active { opacity: .7; }

    /* ── DESKTOP override ── */
    @media (min-width: 640px) {
      #app.visible {
        display: grid;
        grid-template-columns: 1fr 300px;
        grid-template-rows: 40px auto auto auto 1fr auto;
        grid-template-areas:
          "header  header"
          "urlbar  chat"
          "video   chat"
          "ctrls   chat"
          "msgs    chat"
          "cinput  chat";
      }
      #app-header  { grid-area: header; }
      #url-bar     { grid-area: urlbar; }
      #video-block { grid-area: video; max-height: none; height: auto; aspect-ratio: 16/9; }
      #controls    { grid-area: ctrls; border-bottom: none; border-top: 1px solid var(--border); }
      #messages    { grid-area: msgs; }
      #chat-bar    { grid-area: cinput; }
      #chat-section {
        grid-area: chat; border-left: 1px solid var(--border);
        display: flex; flex-direction: column;
      }
      /* on desktop video-block fills naturally */
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes msgIn  { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div class="lobby-title">i want to watch something with you.</div>
    <div class="lobby-sub">i miss u</div>
  </div>
  <div class="lobby-form">
    <input id="name-input" placeholder="your name" maxlength="20"
      inputmode="text" autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();enter()}"/>
    <button onclick="enter()">enter ♥</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="app-header">
    <div class="header-title">just us.</div>
    <div class="presence">
      <div class="dot online"></div>
      <div class="dot" id="dot-partner"></div>
      <div id="presence-label">waiting...</div>
    </div>
  </div>

  <div id="url-bar">
    <input id="yt-url" placeholder="paste a youtube url…" inputmode="url" autocomplete="off"
      onkeydown="if(event.key==='Enter'){event.preventDefault();loadVideo()}"/>
    <button onclick="loadVideo()">load</button>
  </div>

  <div id="video-block">
    <div class="empty-state" id="empty-state">
      <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/>
        <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
      </svg>
      <p>paste a youtube link above</p>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" onclick="ctrlPlay()">▶</button>
    <button class="ctrl-btn" onclick="ctrlPause()">⏸</button>
    <span id="status-bar"></span>
    <span class="sync-pill" id="sync-pill">auto-synced</span>
  </div>

  <!-- chat section: messages list + input bar -->
  <div id="chat-section">
    <div id="messages"></div>
    <div id="chat-bar">
      <input id="chat-input" placeholder="say something…" autocomplete="off"
        onkeydown="if(event.key==='Enter'){event.preventDefault();sendMsg()}"
        onfocus="scrollMsgs()"/>
      <button id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getDatabase, ref, set, push, onValue, onDisconnect
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBSEbVyZtl0qTHvzprqhielKPWL8vYTOw4",
    authDomain: "iwannawatchsomethingwithyou.firebaseapp.com",
    databaseURL: "https://iwannawatchsomethingwithyou-default-rtdb.firebaseio.com",
    projectId: "iwannawatchsomethingwithyou",
    storageBucket: "iwannawatchsomethingwithyou.firebasestorage.app",
    messagingSenderId: "968886424536",
    appId: "1:968886424536:web:869a6687bc26671c3fd8ad"
  };

  const ROOM = "justus";
  const AUTO_SYNC_THRESHOLD = 2.5;
  const HEARTBEAT_MS = 3000;

  const firebase = initializeApp(firebaseConfig);
  const db = getDatabase(firebase);

  let myName = '', player = null, playerReady = false;
  let isSyncing = false, pendingState = null, pendingVideo = null;
  let ytAPIReady = false;
  const ytQ = [];
  let heartbeatTimer = null;
  let msgKeys = new Set();

  // ── YouTube ──────────────────────────────────────────────────────
  window.onYouTubeIframeAPIReady = () => {
    ytAPIReady = true; ytQ.forEach(f => f()); ytQ.length = 0;
    if (pendingVideo) { makePlayer(pendingVideo); pendingVideo = null; }
  };
  function withYT(fn) { if (ytAPIReady) fn(); else ytQ.push(fn); }
  function loadYTScript() {
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  }

  function makePlayer(videoId) {
    if (!ytAPIReady) { pendingVideo = videoId; return; }
    document.getElementById('empty-state').style.display = 'none';
    const block = document.getElementById('video-block');
    const old = document.getElementById('yt-player');
    if (old) old.remove();
    playerReady = false;
    const div = document.createElement('div'); div.id = 'yt-player';
    block.appendChild(div);
    player = new YT.Player('yt-player', {
      videoId,
      playerVars: { autoplay: 1, controls: 1, rel: 0, modestbranding: 1, playsinline: 1 },
      events: {
        onReady: () => {
          playerReady = true;
          if (pendingState) { applyState(pendingState); pendingState = null; }
        },
        onStateChange: e => {
          if (isSyncing || !playerReady) return;
          const t = player.getCurrentTime();
          if (e.data === YT.PlayerState.PLAYING)  { pushState('play',  t); startHB(); }
          if (e.data === YT.PlayerState.PAUSED)   { pushState('pause', t); stopHB();  }
        }
      }
    });
  }

  function startHB() {
    stopHB();
    heartbeatTimer = setInterval(() => {
      if (!playerReady || player?.getPlayerState() !== YT.PlayerState.PLAYING) return;
      set(ref(db, `${ROOM}/heartbeat`), { time: player.getCurrentTime(), by: myName, ts: Date.now() });
    }, HEARTBEAT_MS);
  }
  function stopHB() { clearInterval(heartbeatTimer); heartbeatTimer = null; }

  // ── Utils ────────────────────────────────────────────────────────
  function extractId(url) {
    const m = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  function setStatus(t) { document.getElementById('status-bar').textContent = t; }
  function flashPill() {
    const p = document.getElementById('sync-pill');
    p.classList.add('on'); setTimeout(() => p.classList.remove('on'), 2000);
  }

  window.scrollMsgs = () => {
    setTimeout(() => {
      const box = document.getElementById('messages');
      box.scrollTop = box.scrollHeight;
    }, 350); // wait for keyboard animation
  };

  function addMsg(name, text, mine, sys = false) {
    const box = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg' + (mine ? ' mine' : '') + (sys ? ' system' : '');
    if (sys) {
      d.innerHTML = `<div class="msg-body">${text}</div>`;
    } else {
      d.innerHTML = `${!mine ? `<div class="msg-name">${name}</div>` : ''}
        <div class="msg-body">${text}</div>`;
    }
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  // ── Enter ────────────────────────────────────────────────────────
  window.enter = () => {
    const n = document.getElementById('name-input').value.trim();
    if (!n) { document.getElementById('name-input').focus(); return; }
    myName = n;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    loadYTScript();
    setupPresence();
    listenRoom();
    push(ref(db, `${ROOM}/messages`), { name: '—', text: `${myName} joined`, system: true, ts: Date.now() });
  };

  // ── Presence ─────────────────────────────────────────────────────
  function setupPresence() {
    const pr = ref(db, `${ROOM}/presence/${myName}`);
    set(pr, { name: myName });
    onDisconnect(pr).remove();
    onValue(ref(db, `${ROOM}/presence`), snap => {
      const data = snap.val() || {};
      const others = Object.keys(data).filter(u => u !== myName);
      const dot = document.getElementById('dot-partner');
      const lbl = document.getElementById('presence-label');
      if (others.length) { dot.classList.add('online'); lbl.textContent = others[0] + ' is here ♥'; }
      else { dot.classList.remove('online'); lbl.textContent = 'waiting...'; }
    });
  }

  // ── Listeners ────────────────────────────────────────────────────
  function listenRoom() {
    onValue(ref(db, `${ROOM}/video`), snap => {
      const v = snap.val();
      if (!v?.videoId) return;
      if (v.videoId !== player?.getVideoData?.()?.video_id) makePlayer(v.videoId);
    });

    onValue(ref(db, `${ROOM}/state`), snap => {
      const s = snap.val();
      if (!s || s.by === myName) return;
      if (!playerReady) { pendingState = s; return; }
      applyState(s);
    });

    onValue(ref(db, `${ROOM}/heartbeat`), snap => {
      const h = snap.val();
      if (!h || h.by === myName || !playerReady) return;
      const drift = Math.abs(player.getCurrentTime() - h.time);
      if (drift > AUTO_SYNC_THRESHOLD) {
        isSyncing = true;
        player.seekTo(h.time + 0.3, true);
        if (player.getPlayerState() !== YT.PlayerState.PLAYING) player.playVideo();
        setStatus(`↺ synced (${drift.toFixed(1)}s)`);
        flashPill();
        setTimeout(() => { isSyncing = false; }, 800);
      }
    });

    onValue(ref(db, `${ROOM}/messages`), snap => {
      const msgs = snap.val();
      if (!msgs) return;
      Object.entries(msgs).forEach(([k, m]) => {
        if (!msgKeys.has(k)) { msgKeys.add(k); addMsg(m.name, m.text, m.name === myName, m.system); }
      });
    });
  }

  function applyState(s) {
    if (!player?.seekTo || !playerReady) return;
    isSyncing = true;
    const lag = Math.min((Date.now() - (s.ts || Date.now())) / 1000, 5);
    player.seekTo(s.time + (s.action === 'play' ? lag : 0), true);
    if (s.action === 'play')  { player.playVideo();  setStatus('▶ synced'); startHB(); }
    if (s.action === 'pause') { player.pauseVideo(); setStatus('⏸ paused'); stopHB();  }
    setTimeout(() => { isSyncing = false; }, 800);
  }

  function pushState(action, time) {
    set(ref(db, `${ROOM}/state`), { action, time, by: myName, ts: Date.now() });
    setStatus(action === 'play' ? '▶ playing' : '⏸ paused');
  }

  // ── Controls ─────────────────────────────────────────────────────
  window.loadVideo = () => {
    const url = document.getElementById('yt-url').value.trim();
    const vid = extractId(url);
    if (!vid) { setStatus('invalid url'); return; }
    set(ref(db, `${ROOM}/video`), { videoId: vid });
    setTimeout(() => pushState('pause', 0), 500);
    push(ref(db, `${ROOM}/messages`), { name: '—', text: `${myName} loaded a new video`, system: true, ts: Date.now() });
  };

  window.ctrlPlay = () => {
    if (!player || !playerReady) return;
    player.playVideo(); pushState('play', player.getCurrentTime()); startHB();
  };
  window.ctrlPause = () => {
    if (!player || !playerReady) return;
    player.pauseVideo(); pushState('pause', player.getCurrentTime()); stopHB();
  };

  window.sendMsg = () => {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    push(ref(db, `${ROOM}/messages`), { name: myName, text, ts: Date.now() });
    input.value = '';
    input.focus();
  };
</script>
</body>
</html>
